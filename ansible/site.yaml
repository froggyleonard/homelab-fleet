---
- name: Baseline hardening (all fleet nodes)
  hosts: all
  become: true
  roles:
    - common_hardening

- name: RKE2 HA control plane (cluster-infra)
  hosts: infra_cp
  become: true
  serial: 1 # first server bootstraps the cluster; others join
  roles:
    - rke2

- name: Deploy k3s server (cluster-apps)
  hosts: apps_cp
  become: true
  roles:
    - k3s

- name: Deploy k3s agents (cluster-apps)
  hosts: apps_workers
  become: true
  roles:
    - k3s
