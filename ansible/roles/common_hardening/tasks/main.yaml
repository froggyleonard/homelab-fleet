---
# Baseline for every fleet node. Applied in P3/P5.
- name: Update apt cache and upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - qemu-guest-agent
      - unattended-upgrades
      - nftables
      - open-iscsi # Longhorn prerequisite (workers)
      - chrony
    state: present

- name: Enable qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Harden sshd — key-only, no root
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-fleet-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitRootLogin no
      X11Forwarding no
      MaxAuthTries 4
  notify: Restart sshd

- name: Load kernel modules required by Kubernetes
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - overlay
    - br_netfilter

- name: Apply Kubernetes sysctl prerequisites
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-kubernetes.conf
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { name: net.ipv4.ip_forward, value: "1" }

- name: Disable active swap
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | default(0) | int > 0
  changed_when: true

- name: Comment out swap entries in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#\n]*\sswap\s.*)$'
    replace: '# \1'

- name: Configure unattended-upgrades — security only, no auto-reboot
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52-fleet-unattended.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      Unattended-Upgrade::Automatic-Reboot "false";
