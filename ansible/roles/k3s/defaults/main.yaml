---
k3s_version: v1.36.2+k3s1

# server | agent — set per group in the inventory.
k3s_role: agent
k3s_server_host: "{{ hostvars[groups['apps_cp'][0]].ansible_host }}"
k3s_service_name: "{{ 'k3s' if k3s_role == 'server' else 'k3s-agent' }}"

k3s_cluster_cidr: 10.110.0.0/16
k3s_service_cidr: 10.111.0.0/16

# Pinned to match the rke2-bundled Cilium on cluster-infra.
k3s_cilium_version: 1.19.4

# Data disks — set per host in the inventory; empty = no disk to prepare.
k3s_longhorn_device: ""
k3s_longhorn_mount: /var/lib/longhorn
k3s_pg_device: ""
k3s_pg_mount: /var/lib/postgresql

# Formatting is opt-in (Amendment A1): mkfs runs only when this is explicitly
# true (set it via -e on rebuilds / new nodes), and only after disk_guard.yaml
# asserts the device identity. Mounts are unaffected — already-formatted disks
# keep mounting on normal runs with the default false.
k3s_allow_disk_format: false

# Expected size bounds (GiB) per data disk — the guard refuses devices outside
# these ranges (terraform provisions Longhorn=200 GiB, PostgreSQL=20 GiB).
k3s_longhorn_size_min_gb: 150
k3s_longhorn_size_max_gb: 250
k3s_pg_size_min_gb: 15
k3s_pg_size_max_gb: 25
