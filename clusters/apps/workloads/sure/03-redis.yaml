# Sidekiq broker/cache. emptyDir — queue loss on restart is acceptable
# (SimpleFIN re-sync repopulates).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sure
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sure
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: fleet
        app.kubernetes.io/managed-by: argocd
    spec:
      containers:
        - name: redis
          image: redis:8.2-alpine
          args: [--save, "", --appendonly, "no"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
