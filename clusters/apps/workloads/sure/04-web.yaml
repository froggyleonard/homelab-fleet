apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-web
  namespace: sure
  labels:
    app.kubernetes.io/name: sure
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sure
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sure
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: fleet
        app.kubernetes.io/managed-by: argocd
    spec:
      containers:
        - name: web
          image: ghcr.io/we-promise/sure:0.7.0
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: sure-secrets
          env:
            - name: RAILS_ENV
              value: production
            - name: SELF_HOSTED
              value: "true"
            - name: APP_DOMAIN
              value: sure.apps.froggyleonard.com
            - name: REDIS_URL
              value: redis://redis.sure.svc.cluster.local:6379/0
            - name: EXCHANGE_RATE_PROVIDER
              value: yahoo_finance
            - name: SECURITIES_PROVIDER
              value: yahoo_finance
            - name: AI_DEBUG_MODE
              value: "false"
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sure
  namespace: sure
  labels:
    app.kubernetes.io/name: sure
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: sure
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
