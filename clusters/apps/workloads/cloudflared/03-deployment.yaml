# Two replicas: Cloudflare load-balances across connectors registered to the
# same tunnel, so this survives a node drain or a single pod restart without
# dropping public traffic. They are spread across nodes deliberately.
#
# Routing (which hostname maps to which service) lives in the Cloudflare
# dashboard, not here — this tunnel is remotely-managed. See ADR/decision note:
# it is the one piece of ingress config in this fleet that is not in git.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: fleet
        app.kubernetes.io/managed-by: argocd
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cloudflared
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.7.3
          args:
            - tunnel
            - --no-autoupdate
            # Metrics endpoint also serves /ready, which the probes below use.
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            # `tunnel run` picks up TUNNEL_TOKEN from the environment; the token
            # encodes the tunnel ID and its secret, so no config file is needed.
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel
                  key: tunnel-token
          ports:
            - name: metrics
              containerPort: 2000
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
