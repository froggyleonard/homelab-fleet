# Default-deny ingress except Traefik. Egress intentionally open: the
# dashboard's whole job is probing arbitrary service URLs (cluster and
# internet) for status tiles; per-target holes would rot with every tile.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: homarr
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homarr-ingress
  namespace: homarr
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homarr
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - port: 7575
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homarr-egress
  namespace: homarr
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - {} # see header comment
