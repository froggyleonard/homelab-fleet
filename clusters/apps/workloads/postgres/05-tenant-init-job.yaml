# Tenants exactly: authentik, n8n, sure, plane (plan v2 disposition table;
# plane added by task 008).
# PostSync hook — reruns on every sync; every statement is idempotent and
# ALTER ROLE converges password rotations from the SOPS secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-tenant-init
  namespace: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: fleet
        app.kubernetes.io/managed-by: argocd
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-tenants
          image: postgres:18.4
          env:
            - name: PGHOST
              value: postgres.postgres.svc.cluster.local
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: AUTHENTIK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: authentik-password
            - name: N8N_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: n8n-password
            - name: SURE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: sure-password
            - name: PLANE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: plane-password
          command:
            - /bin/bash
            - -ceu
            - |
              until pg_isready -q; do echo "waiting for postgres..."; sleep 3; done
              for tenant in authentik n8n sure plane; do
                pw_var="$(echo "$tenant" | tr a-z A-Z)_PASSWORD"
                pw="${!pw_var}"
                echo "=== tenant: $tenant ==="
                psql -v ON_ERROR_STOP=1 -d postgres \
                  -c "DO \$\$ BEGIN
                        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '$tenant') THEN
                          CREATE ROLE $tenant LOGIN;
                        END IF;
                      END \$\$;" \
                  -c "ALTER ROLE $tenant LOGIN PASSWORD '$pw';"
                # Standalone assignment so a failed psql aborts the run (set -e)
                # instead of reading as "database missing".
                exists=$(psql -v ON_ERROR_STOP=1 -tAc "SELECT 1 FROM pg_database WHERE datname = '$tenant'")
                if [ -z "$exists" ]; then
                  psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE $tenant OWNER $tenant"
                fi
                psql -v ON_ERROR_STOP=1 -d postgres \
                  -c "REVOKE ALL ON DATABASE $tenant FROM PUBLIC" \
                  -c "GRANT ALL ON DATABASE $tenant TO $tenant"
              done
              echo "tenant init complete"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
