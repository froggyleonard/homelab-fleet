apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      # fsGroup so the non-root init container may write into the emptyDir
      # (cluster enforces PSA restricted via the RKE2 CIS profile).
      securityContext:
        fsGroup: 999
      initContainers:
        - name: install-ksops
          image: viaductoss/ksops:v4.5.1
          command: ["/usr/local/bin/ksops", "install", "--with-kustomize", "/custom-tools"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /custom-tools
              name: custom-tools
      containers:
        - name: argocd-repo-server
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /.config/sops/age/keys.txt
          volumeMounts:
            - mountPath: /usr/local/bin/kustomize
              name: custom-tools
              subPath: kustomize
            - mountPath: /usr/local/bin/ksops
              name: custom-tools
              subPath: ksops
            - mountPath: /.config/sops/age
              name: sops-age
              readOnly: true
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: sops-age
          secret:
            # Created imperatively at bootstrap; never in git:
            # kubectl -n argocd create secret generic sops-age \
            #   --from-file=keys.txt=$HOME/.config/sops/age/keys.txt
            secretName: sops-age
