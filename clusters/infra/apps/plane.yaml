# Plane CE (task 008): project tracker with official MCP support. External PG
# (shared postgres tenant); chart-managed valkey/rabbitmq/minio on Longhorn.
# All credentials come from the SOPS-managed plane-secrets (plane-config app) —
# the four external_secrets slots point at the same Secret; the chart skips
# rendering its own plaintext secrets when a slot is set.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  namespace: argocd
  labels:
    app.kubernetes.io/name: plane
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://helm.plane.so
    chart: plane-ce
    targetRevision: 1.6.0
    helm:
      valuesObject:
        # Chart 1.6.0 declares appVersion 1.3.1 but its values default still
        # says v1.2.0 — pin the declared appVersion explicitly.
        planeVersion: v1.3.1
        ingress:
          enabled: true
          appHost: plane.apps.froggyleonard.com
          # Chart emits native Traefik IngressRoute CRDs (websecure entrypoint,
          # 7-path route map across web/space/admin/api/live/minio) — satisfies
          # the IngressRoute-only convention without hand-maintaining paths.
          ingressClass: traefik
        ssl:
          createIssuer: false
          generateCerts: false
        postgres:
          # External: shared PG tenant via DATABASE_URL in plane-secrets.
          local_setup: false
        redis:
          local_setup: true
          storageClass: longhorn
          volumeSize: 1Gi
        rabbitmq:
          local_setup: true
          storageClass: longhorn
          volumeSize: 1Gi
        minio:
          local_setup: true
          # Chart default is minio:latest — pin per fleet convention.
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          image_mc: minio/mc:RELEASE.2025-08-13T08-35-41Z
          storageClass: longhorn
          volumeSize: 10Gi
        web:
          pullPolicy: IfNotPresent
        space:
          pullPolicy: IfNotPresent
        admin:
          pullPolicy: IfNotPresent
        live:
          pullPolicy: IfNotPresent
        api:
          pullPolicy: IfNotPresent
        worker:
          pullPolicy: IfNotPresent
        beatworker:
          pullPolicy: IfNotPresent
        external_secrets:
          rabbitmq_existingSecret: plane-secrets
          pgdb_existingSecret: plane-secrets
          doc_store_existingSecret: plane-secrets
          app_env_existingSecret: plane-secrets
          live_env_existingSecret: plane-secrets
  destination:
    name: apps
    namespace: plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
