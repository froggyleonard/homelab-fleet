# Companion to the plane chart app: namespace, SOPS secrets, netpols.
# (IngressRoute comes from the chart itself — see plane.yaml.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: plane-config
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/apps/workloads/plane
  destination:
    name: apps
    namespace: plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
