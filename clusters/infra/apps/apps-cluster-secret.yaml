apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-cluster-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: apps-cluster-secret
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/infra/manifests/apps-cluster-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
