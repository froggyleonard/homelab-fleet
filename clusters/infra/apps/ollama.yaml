apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/apps/workloads/ollama
  destination:
    name: apps
    namespace: ollama
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
