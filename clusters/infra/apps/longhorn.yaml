apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.12.0
    helm:
      valuesObject:
        # The chart's pre-upgrade Helm hook maps to an ArgoCD PreSync hook that
        # also runs on first install, where it deadlocks waiting on a SA the
        # main sync would create. Longhorn documents disabling it for GitOps.
        preUpgradeChecker:
          jobEnabled: false
          upgradeVersionCheck: false
        persistence:
          defaultClassReplicaCount: 2
        defaultSettings:
          defaultDataPath: /var/lib/longhorn
  destination:
    server: https://xx.xx.110.11:6443
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
