# Companion to the authentik chart app: namespace, SOPS secrets, netpols,
# IngressRoute.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: authentik-config
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/apps/workloads/authentik
  destination:
    name: apps
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
