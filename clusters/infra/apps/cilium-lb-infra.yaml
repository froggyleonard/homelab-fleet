apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-lb-infra
  namespace: argocd
  labels:
    app.kubernetes.io/name: cilium-lb-infra
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/infra/platform/cilium-lb
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
