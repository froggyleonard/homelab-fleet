apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sure
  namespace: argocd
  labels:
    app.kubernetes.io/name: sure
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/apps/workloads/sure
  destination:
    name: apps
    namespace: sure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
