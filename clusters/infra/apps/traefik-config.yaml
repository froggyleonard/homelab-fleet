# Companion to the traefik chart app: namespace (labeled), NetworkPolicies,
# and later the wildcard Certificate + default TLS store.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: traefik-config
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/froggyleonard/homelab-fleet
    targetRevision: main
    path: clusters/apps/platform/traefik
  destination:
    name: apps
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
