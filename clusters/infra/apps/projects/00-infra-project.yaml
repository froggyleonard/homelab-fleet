apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  annotations:
    # Projects must exist before any Application references them.
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/name: infra
    app.kubernetes.io/part-of: fleet
    app.kubernetes.io/managed-by: argocd
spec:
  description: Hub-cluster platform — fleet repo only, hub destination only
  sourceRepos:
    - https://github.com/froggyleonard/homelab-fleet
  # P6 tightening: hub apps live in argocd (Applications/AppProjects/cluster
  # secret), fleet-system (cluster-info), and kube-system (Cilium LB pools).
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: fleet-system
    - server: https://kubernetes.default.svc
      namespace: kube-system
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: cilium.io
      kind: CiliumLoadBalancerIPPool
    - group: cilium.io
      kind: CiliumL2AnnouncementPolicy
